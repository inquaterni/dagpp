# This starter workflow is for a CMake project running on multiple platforms.
name: CMake on multiple platforms

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                build_type: [Release]
                c_compiler: [gcc-14, clang-18, cl]
                include:
                    - os: windows-latest
                      c_compiler: cl
                      cpp_compiler: cl
                    - os: ubuntu-latest
                      c_compiler: gcc-14
                      cpp_compiler: g++-14
                    - os: ubuntu-latest
                      c_compiler: clang-18
                      cpp_compiler: clang++-18
                exclude:
                    - os: windows-latest
                      c_compiler: gcc-14
                    - os: windows-latest
                      c_compiler: clang-18
                    - os: ubuntu-latest
                      c_compiler: cl

        steps:
            - uses: actions/checkout@v4

            - name: Set reusable strings
              id: strings
              shell: bash
              run: |
                  echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
            - name: Install libc++ for Clang
              if: matrix.c_compiler == 'clang-18' && runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libc++-18-dev libc++abi-18-dev

            - name: Configure CMake
              env:
                  CXXFLAGS: ${{ matrix.c_compiler == 'clang-18' && '-stdlib=libc++' || '' }}
              run: >
                  cmake -B ${{ steps.strings.outputs.build-output-dir }}
                  -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
                  -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
                  -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                  -S ${{ github.workspace }}

            - name: Build
              run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

            - name: Test
              working-directory: ${{ steps.strings.outputs.build-output-dir }}
              run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

    coverage:
        name: Code coverage
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   name: Install dependencies
                run: |
                    sudo apt-get update
                    sudo apt-get install -y gcc-14 g++-14 gcovr

            -   name: Configure CMake for coverage
                run: >
                    cmake -B build
                    -DCMAKE_CXX_COMPILER=g++-14
                    -DCMAKE_C_COMPILER=gcc-14
                    -DCMAKE_BUILD_TYPE=Debug
                    -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
                    -DCMAKE_C_FLAGS="--coverage -O0 -g"
                    -DCMAKE_EXE_LINKER_FLAGS="--coverage"
                    -S ${{ github.workspace }}

            -   name: Build
                run: cmake --build build

            -   name: Test
                working-directory: build
                run: ctest --output-on-failure

            -   name: Extract Coverage Percentage
                id: coverage
                run: |
                    # Run gcovr with summary flag (-s) to get the clean text output
                    # Grab the "lines:" row, extract the percentage, and strip the '%' sign
                    COVERAGE=$(gcovr -r ${{ github.workspace }} -s | grep "^lines:" | awk '{print $2}' | tr -d '%')
                    echo "Coverage is $COVERAGE%"
                    echo "percent=$COVERAGE" >> $GITHUB_OUTPUT

            -   name: Update coverage badge gist
                uses: Schneegans/dynamic-badges-action@v1.7.0
                with:
                    auth: ${{ secrets.GIST_SECRET }}
                    gistID: 659b74483a5f3c2f917da4678ef3c733
                    filename: coverage.json
                    label: coverage
                    color: ${{ steps.coverage.outputs.percent > 80 && 'green' || steps.coverage.outputs.percent > 60 && 'yellow' || 'red' }}
                    message: ''